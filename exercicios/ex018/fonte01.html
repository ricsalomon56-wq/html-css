<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google fonts</title>
   <style>
    @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
    body{
        font-family: 'Kaushan Script', cursive, 'Work Sans', sans-serif;
    }
    h1{
        font-family: 'Kaushan Script', cursive;
        font-size: 3em;
    }
    h2{
        font-family: 'Work Sans', sans-serif;
        font-size: 2em;
    }
    p{
        font-family: 'Work Sans', sans-serif;
        font-size: 1.2em;
    }
    </style>
    
</head>
<body>
    <h1>Exemplo de fontes com Google Fonts</h1>
    <h2>Subtítulo usando Work Sans</h2>
    <p>Este é um parágrafo de exemplo usando a fonte Work Sans. Você pode personalizar o estilo e o peso da fonte conforme necessário.</p>
    
</body>
</html>
