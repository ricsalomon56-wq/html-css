<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
        font-family: Arial, Helvetica, sans-serif;
        }
        div > p {
        display: none;
        background-color: #c52222;
        color: #fff;
        width: 200px;
        }
        div:hover > p {
        display: block;
        }
        div:hover {
        color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <p>Passe o mouse sobre o texto abaixo para ver o efeito de hover:</p>
    <div>
        Passe o mouse aqui
        <p>Texto escondido</p>
    </div>
</body>
</html>
