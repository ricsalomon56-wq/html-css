<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* Seletores Personalizados         #  - id
        .  - class
        :  - pseudo-class
        :: - pseudo-element
        >  - child selector
        */
        a:link {
            color: blue;
            text-decoration: none;
        }   
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a {
            color:blue;
            text-decoration: none;
        }
        a:visited { color:darkblue
         }
        a:hover { color: red;
            text-decoration: underline;
            }
        a:active { color: green;
            }
        .especial::after {
            content: " 👈";
            font-size: 0.8em;
            color: gray;    
        }
        .especial::before {
            content: "👉 ";
            font-size: 0.8em;
            color: gray;    
        }
        .especial {
            color: purple;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1> Personalizando Links</h1>
    <ul>
        <li> <a href="https://github.com">Repositório GitHub</a></li>
        <li> <a href="https://youtube.com" class="especial">Canal de Youtube</a></li>
        <li> <a href="https://cursos.com">Site de Cursos</a></li>
    </ul>
</body>
</html>
