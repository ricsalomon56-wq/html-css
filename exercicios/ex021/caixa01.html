<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 { /* h1 é um exemplo de box-level, ou seja, uma caixa de bloco. */
            background-color: lightblue;
            padding-top: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            /* padding: top right bottom left; */
            height: 200px;
            width: 200px;
            border-width: 10px;
            border-color: black;
            border-style: groove;
            /* pode substituir por border: width;color;style; */
            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;
            /* margin: top right bottom left; */
            outline-width: 10px;
            outline-color: red; 
            outline-style: dashed;
            /* outline: width color style; */
        }
        a { /* a é um exemplo de caixa in-line level, ou seja, uma caixa de linha. */
            background-color: lightgreen;
            padding: 10px;  
            height: 50px;
            width: 100px;
            border-width: 5px;
            border-color: black;
            border-style: dashed;

        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também sao exemplos de box-level, mas os <a href="#">links sao exemplos de caixas in-line level</a>. Vamos ver como isso funciona.</p>
</body>
</html>
