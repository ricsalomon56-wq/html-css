<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos em HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video está hospedado no meu próprio servidor.</p>
    <video controls width="500">
        <source src="media/La Momia full.mp4" type="video/mp4">
    </video>
    <video controls width="500">
        <source src="media/boxlt.mp4" type="video/mp4">
    </video>
    <h1>Inserindo video hospedado externamente</h1>
    <p>Este video está hospedado no YouTube.</p>
  
   <iframe width="560" height="315" src="https://www.youtube.com/embed/m4I37FZjIh4?si=yS-_5KgmPsmKTo_P" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
